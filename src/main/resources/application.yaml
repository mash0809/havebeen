spring:
  application:
    name: havebeen
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/havebeen
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:topsecret}
  jpa:
    # Dialect를 명시해 Hibernate의 isolated connection(dialect 자동감지용) 시도를 방지한다.
    # Hibernate 6 + Spring Boot 3.x에서 isolated connection은 Spring datasource를 우회해
    # 기본 사용자(root)로 접속을 시도하므로 명시적 설정이 필요하다.
    database-platform: org.hibernate.dialect.MySQLDialect
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=200,expireAfterWrite=60m